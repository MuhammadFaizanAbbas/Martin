<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MS Dach GmbH CRM | Lead Management</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Main CSS -->
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<section class="auth-screen" id="authScreen" aria-label="Login">
  <div class="auth-panel">
    <div class="auth-logo">
      <div class="auth-logo-mark">M</div>
      <div class="auth-logo-text">
        <strong>MS DACH GMBH</strong>
        <span>schnell, zuverlässig, flexibel</span>
      </div>
    </div>

    <div class="auth-copy">
      <h1 id="authTitle">Willkommen zurück</h1>
      <p id="authSubtitle">Bitte melden Sie sich an um fortzufahren</p>
    </div>

    <form class="auth-form" id="loginForm">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" autocomplete="email" placeholder="Geben Sie Ihre E-Mail-Adresse ein">

      <label for="loginPassword">Passwort</label>
      <input type="password" id="loginPassword" autocomplete="current-password" placeholder="Geben Sie Ihr Passwort ein">

      <button type="submit" class="auth-primary-btn">Login</button>
    </form>

    <div class="auth-message" id="authMessage" role="status"></div>
  </div>
</section>

<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1>MS Dach GmbH CRM</h1>
      <span>Lead Management</span>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item" data-page="dashboard">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
        Dashboard
      </button>
      
      <button class="nav-item" data-page="leads">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4" />
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
        </svg>
        Alle Leads
      </button>
      
      <button class="nav-item" data-page="anruferin">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 3.08 5.18 2 2 0 0 1 5.06 3h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L9.09 10.91A16 16 0 0 0 13.09 15l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 16z" />
        </svg>
        Anruferin
      </button>
      
      <button class="nav-item" data-page="berichte">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
          <line x1="10" y1="9" x2="8" y2="9" />
        </svg>
        Berichte
      </button>
      
      <button class="nav-item" data-page="kunden">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        Meine Kunden
      </button>
      
      <button class="nav-item" data-page="einstellung">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
        Einstellung
      </button>

      <button class="nav-item" data-page="Commission">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
  <circle cx="12" cy="12" r="10"/>
  <path d="M14.5 9.5L17.5 6.5"/>
  <path d="M8.5 15.5L5.5 18.5"/>
  <path d="M15 19L19 15"/>
  <path d="M9 5L5 9"/>
</svg>
        Provisions
      </button>



    </nav>

    <div class="sidebar-footer">
      <div class="user-row">
        <div class="avatar">M</div>
        <div class="user-name">Martin Schwaak</div>
      </div>
      <button class="logout-btn" id="logoutBtn">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Abmelden
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    <div class="top-header ">
      <div class="page-title" id="dynamicPageTitle">
        <h1>Dashboard</h1>
        <p>Übersicht & Statistiken</p>
      </div>
      <div class="header-actions">
       
        <!-- <div class="action-btn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          Benachrichtigungen
        </div> -->
         <button class="menu-toggle" id="menuToggleBtn">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
          Menü
        </button>
      </div>
    </div>
    <div class="content-area" id="contentArea">
      <!-- Dynamic content loads here -->
       <!-- LEADS -->
    </div>
  </main>
  <div class="mobile-overlay" id="mobileOverlay"></div>
</div>

<!-- Scripts -->
<script src="js/auth.js"></script>
<script src="js/sideBar.js"></script>
<!-- <script src="/main.js"></script> -->
<script src="js/page.js"></script>


<!-- Page Specific Scripts (loaded dynamically) -->
<!-- <script id="pageScript"></script> -->
</body>
</html>
